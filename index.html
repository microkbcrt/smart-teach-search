<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智教联盟论坛全文搜索（精准匹配）</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #f5f7fb;
        }
        .container {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 1.8rem;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.25rem 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sub {
            color: #4b5563;
            margin-bottom: 1.8rem;
            border-left: 3px solid #26a03d;
            padding-left: 0.8rem;
            font-size: 0.9rem;
        }
        #search-box {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 48px;
            outline: none;
            background: #ffffff;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        #search-box:focus {
            border-color: #26a03d;
            box-shadow: 0 0 0 3px rgba(38,160,61,0.15);
        }
        .stats {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #4a5568;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 0.5rem;
        }
        .result {
            margin: 1.5rem 0;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid #eef2f6;
        }
        .result-title {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .result-title a {
            text-decoration: none;
            color: #1e3a8a;
        }
        .result-title a:hover {
            text-decoration: underline;
            color: #1e40af;
        }
        .result-meta {
            font-size: 0.75rem;
            color: #6c757d;
            margin: 0.25rem 0 0.5rem 0;
            display: flex;
            gap: 1rem;
        }
        .result-snippet {
            color: #334155;
            line-height: 1.45;
            font-size: 0.9rem;
        }
        mark {
            background: #ffec9f;
            border-radius: 6px;
            padding: 0 2px;
            color: #2d2d2d;
        }
        .no-results {
            text-align: center;
            padding: 2rem;
            color: #5b6e8c;
            font-size: 0.95rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .error-msg {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            padding: 0.8rem;
            border-radius: 12px;
            margin: 1rem 0;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 智教联盟论坛</h1>
    <div class="sub">全文搜索 · 直接匹配标题和内容 · 每日更新</div>
    <input type="text" id="search-box" placeholder="输入关键词，例如：自动关机" autofocus>
    <div class="stats" id="stats">📄 加载索引中...</div>
    <div id="results"></div>
    <footer>数据源 forum.smart-teach.cn | 索引由 GitHub Actions 每日生成 | 搜索方式：子串精确匹配</footer>
</div>

<script>
    (function() {
        let documents = [];
        const searchInput = document.getElementById('search-box');
        const resultsDiv = document.getElementById('results');
        const statsSpan = document.getElementById('stats');

        async function loadIndex() {
            try {
                const resp = await fetch('search-index.json');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                documents = await resp.json();
                statsSpan.innerText = `✅ 已加载 ${documents.length} 个话题，输入关键词进行精确匹配搜索`;
                console.log(`索引加载完成，共 ${documents.length} 条记录`);
            } catch (err) {
                console.error(err);
                statsSpan.innerText = '❌ 索引加载失败，请刷新页面重试';
                resultsDiv.innerHTML = `<div class="error-msg">⚠️ 无法加载 search-index.json，请确认网络或稍后再试。</div>`;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function highlight(text, keyword) {
            if (!text || !keyword) return escapeHtml(text);
            const escapedKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedKeyword})`, 'gi');
            return escapeHtml(text).replace(regex, '<mark>$1</mark>');
        }

        function getSnippet(text, keyword, maxLen = 220) {
            if (!text) return '';
            const lowerText = text.toLowerCase();
            const lowerKeyword = keyword.toLowerCase();
            const idx = lowerText.indexOf(lowerKeyword);
            if (idx === -1) {
                return text.slice(0, maxLen) + (text.length > maxLen ? '…' : '');
            }
            let start = Math.max(0, idx - 60);
            let end = Math.min(text.length, start + maxLen);
            let snippet = text.slice(start, end);
            if (start > 0) snippet = '…' + snippet;
            if (end < text.length) snippet = snippet + '…';
            return snippet;
        }

        // 计算匹配得分：标题匹配权重高，内容匹配权重低，且关键词出现次数越多越好
        function calculateScore(doc, keyword) {
            const lowerKeyword = keyword.toLowerCase();
            const titleLower = doc.title.toLowerCase();
            const contentLower = doc.content.toLowerCase();
            let score = 0;
            // 标题匹配
            if (titleLower.includes(lowerKeyword)) {
                score += 100;
                // 标题中出现次数越多越好
                const titleCount = (titleLower.match(new RegExp(lowerKeyword, 'g')) || []).length;
                score += titleCount * 10;
            }
            // 内容匹配
            if (contentLower.includes(lowerKeyword)) {
                score += 10;
                const contentCount = (contentLower.match(new RegExp(lowerKeyword, 'g')) || []).length;
                score += contentCount;
            }
            // 日期越新加分（可选，避免完全依赖关键词）
            if (doc.created) {
                const postDate = new Date(doc.created);
                const now = new Date();
                const ageInDays = (now - postDate) / (1000 * 60 * 60 * 24);
                if (ageInDays < 30) score += 5;
                else if (ageInDays < 90) score += 2;
            }
            return score;
        }

        function search(keyword) {
            if (!keyword.trim()) return [];
            const lowerKeyword = keyword.trim().toLowerCase();
            // 精确匹配：标题或内容包含关键词（不区分大小写）
            const matched = documents.filter(doc => 
                doc.title.toLowerCase().includes(lowerKeyword) || 
                doc.content.toLowerCase().includes(lowerKeyword)
            );
            // 按得分排序
            matched.sort((a, b) => calculateScore(b, lowerKeyword) - calculateScore(a, lowerKeyword));
            return matched;
        }

        function renderResults() {
            const keyword = searchInput.value.trim();
            if (!keyword) {
                resultsDiv.innerHTML = '';
                statsSpan.innerText = `📄 共 ${documents.length} 个话题，输入关键词开始搜索`;
                return;
            }

            const matched = search(keyword);
            if (matched.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">😔 没有找到包含该关键词的帖子，尝试其他词</div>';
                statsSpan.innerText = `📄 共 ${documents.length} 个话题 · 无匹配结果`;
                return;
            }

            let html = '';
            for (let doc of matched.slice(0, 100)) {
                const titleHighlight = highlight(doc.title, keyword);
                const snippetRaw = getSnippet(doc.content, keyword);
                const snippetHighlight = highlight(snippetRaw, keyword);
                html += `
                    <div class="result">
                        <div class="result-title"><a href="${doc.url}" target="_blank" rel="noopener">${titleHighlight}</a></div>
                        <div class="result-meta">
                            <span>📅 ${doc.created || '未知日期'}</span>
                            <span>🔗 <a href="${doc.url}" target="_blank" style="color:#2c6e9c;">直达帖子</a></span>
                        </div>
                        <div class="result-snippet">${snippetHighlight}</div>
                    </div>
                `;
            }
            resultsDiv.innerHTML = html;
            statsSpan.innerText = `📄 共 ${documents.length} 个话题 · 找到 ${matched.length} 条结果`;
        }

        let debounceTimer;
        searchInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(renderResults, 150);
        });

        loadIndex().then(() => {
            // 初始无搜索词，不显示结果
        });
    })();
</script>
</body>
</html>
