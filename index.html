<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智教联盟论坛全文搜索</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #f5f7fb;
        }
        .container {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 1.8rem;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.25rem 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sub {
            color: #4b5563;
            margin-bottom: 1.8rem;
            border-left: 3px solid #26a03d;
            padding-left: 0.8rem;
            font-size: 0.9rem;
        }
        #search-box {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 48px;
            outline: none;
            background: #ffffff;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        #search-box:focus {
            border-color: #26a03d;
            box-shadow: 0 0 0 3px rgba(38,160,61,0.15);
        }
        .stats {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #4a5568;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 0.5rem;
        }
        .result {
            margin: 1.5rem 0;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid #eef2f6;
        }
        .result-title {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .result-title a {
            text-decoration: none;
            color: #1e3a8a;
        }
        .result-title a:hover {
            text-decoration: underline;
            color: #1e40af;
        }
        .result-meta {
            font-size: 0.75rem;
            color: #6c757d;
            margin: 0.25rem 0 0.5rem 0;
            display: flex;
            gap: 1rem;
        }
        .result-snippet {
            color: #334155;
            line-height: 1.45;
            font-size: 0.9rem;
        }
        mark {
            background: #ffec9f;
            border-radius: 6px;
            padding: 0 2px;
            color: #2d2d2d;
        }
        .no-results {
            text-align: center;
            padding: 2rem;
            color: #5b6e8c;
            font-size: 0.95rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #3b82f6;
        }
        .error-msg {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            padding: 0.8rem;
            border-radius: 12px;
            margin: 1rem 0;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 智教联盟论坛</h1>
    <div class="sub">全文搜索 · 每日自动更新索引</div>
    <input type="text" id="search-box" placeholder="输入关键词，例如：自动关机 或 Awesome Iwb" autofocus>
    <div class="stats" id="stats">📄 加载索引中...</div>
    <div id="results"></div>
    <footer>数据源 forum.smart-teach.cn | 索引由 GitHub Actions 每日生成</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/minisearch@6.3.0/dist/umd/index.min.js"></script>
<script>
    (function() {
        let miniSearch = null;
        let documents = [];
        const searchInput = document.getElementById('search-box');
        const resultsDiv = document.getElementById('results');
        const statsSpan = document.getElementById('stats');

        async function loadIndex() {
            try {
                const resp = await fetch('search-index.json');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                documents = await resp.json();
                statsSpan.innerText = `📄 已索引 ${documents.length} 个话题，正在构建索引...`;

                // 初始化 MiniSearch，优化中文匹配
                miniSearch = new MiniSearch({
                    fields: ['title', 'content'],
                    storeFields: ['title', 'content', 'url', 'created', 'id'],
                    searchOptions: {
                        boost: { title: 3 },
                        fuzzy: 0.2,          // 模糊匹配，允许20%拼写差异
                        prefix: true,        // 前缀匹配
                        boostDocument: (doc, term, storedFields) => {
                            // 根据发布日期提升新帖权重
                            if (storedFields.created) {
                                const postDate = new Date(storedFields.created);
                                const now = new Date();
                                const ageInDays = (now - postDate) / (1000 * 60 * 60 * 24);
                                // 30天内新帖权重提升20%
                                return ageInDays < 30 ? 1.2 : 1.0;
                            }
                            return 1.0;
                        }
                    }
                });

                // 准备文档数据
                const docsForIndex = documents.map(doc => ({
                    id: doc.id,
                    title: doc.title,
                    content: doc.content,
                    url: doc.url,
                    created: doc.created
                }));

                miniSearch.addAll(docsForIndex);
                statsSpan.innerText = `✅ 已索引 ${documents.length} 个话题，输入关键词开始搜索`;
                console.log('MiniSearch 索引构建完成，配置：fuzzy + prefix + 新帖提权');
            } catch (err) {
                console.error(err);
                statsSpan.innerText = '❌ 索引加载失败，请刷新页面重试';
                resultsDiv.innerHTML = `<div class="error-msg">⚠️ 无法加载 search-index.json，请确认网络或稍后再试。</div>`;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function highlight(text, queryTerms) {
            if (!text || !queryTerms.length) return escapeHtml(text);
            let result = escapeHtml(text);
            const uniqueTerms = [...new Set(queryTerms.map(t => t.toLowerCase()))];
            for (let term of uniqueTerms) {
                if (term.length < 2) continue;
                const regex = new RegExp(`(${escapeRegex(term)})`, 'gi');
                result = result.replace(regex, '<mark>$1</mark>');
            }
            return result;
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function getSnippet(content, queryTerms, maxLen = 220) {
            if (!content) return '';
            const lowerContent = content.toLowerCase();
            let bestIndex = -1;
            for (let term of queryTerms) {
                const idx = lowerContent.indexOf(term.toLowerCase());
                if (idx !== -1 && (bestIndex === -1 || idx < bestIndex)) {
                    bestIndex = idx;
                }
            }
            if (bestIndex === -1) {
                return content.slice(0, maxLen) + (content.length > maxLen ? '…' : '');
            }
            let start = Math.max(0, bestIndex - 60);
            let end = Math.min(content.length, start + maxLen);
            let snippet = content.slice(start, end);
            if (start > 0) snippet = '…' + snippet;
            if (end < content.length) snippet = snippet + '…';
            return snippet;
        }

        function renderResults(query) {
            if (!miniSearch || !query.trim()) {
                resultsDiv.innerHTML = '';
                if (query.trim() === '') statsSpan.innerText = `📄 已索引 ${documents.length} 个话题`;
                return;
            }

            try {
                // 执行搜索，使用已配置的 searchOptions（fuzzy, prefix, boostDocument 会自动生效）
                const rawResults = miniSearch.search(query);
                if (rawResults.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">😔 没有找到相关结果，尝试其他关键词（可尝试更短的词）</div>';
                    statsSpan.innerText = `📄 已索引 ${documents.length} 个话题 · 无匹配结果`;
                    return;
                }

                const queryTerms = query.trim().split(/\s+/).filter(t => t.length > 1);
                let html = '';
                for (let i = 0; i < Math.min(rawResults.length, 100); i++) {
                    const doc = rawResults[i];
                    const titleHighlight = highlight(doc.title, queryTerms);
                    const snippetRaw = getSnippet(doc.content, queryTerms);
                    const snippetHighlight = highlight(snippetRaw, queryTerms);
                    html += `
                        <div class="result">
                            <div class="result-title"><a href="${doc.url}" target="_blank" rel="noopener">${titleHighlight}</a></div>
                            <div class="result-meta">
                                <span>📅 ${doc.created || '未知日期'}</span>
                                <span>🔗 <a href="${doc.url}" target="_blank" style="color:#2c6e9c;">直达帖子</a></span>
                            </div>
                            <div class="result-snippet">${snippetHighlight}</div>
                        </div>
                    `;
                }
                resultsDiv.innerHTML = html;
                statsSpan.innerText = `📄 共 ${documents.length} 个话题 · 找到 ${rawResults.length} 条结果`;
            } catch (err) {
                console.error(err);
                resultsDiv.innerHTML = '<div class="no-results">搜索出错，请重试</div>';
            }
        }

        let debounceTimer;
        searchInput.addEventListener('input', function(e) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                renderResults(e.target.value.trim());
            }, 200);
        });

        loadIndex();
    })();
</script>
</body>
</html>
